<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://kevinoceanliu.github.io/pages/earthfront.html">
    <meta property="og:url" content="https://kevinoceanliu.github.io/pages/earthfront.html">
    <title>EarthFront Updates - Liu Haiyang</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Liu Haiyang</div>
            <ul class="nav-menu">
                <li><a href="../index.html">Home</a></li>
                <li><a href="about.html" class="active">Others</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main class="journal-page">
        <section class="journal-simple-header">
            <p><strong class="journal-label">Updated:</strong> <span id="tracked-updated-at">Loading...</span></p>
            <p><strong class="journal-label">Tracked journals:</strong> <span id="tracked-journal-names">Loading...</span></p>
            <p><strong class="journal-label">Current display:</strong> <span id="tracked-article-summary">Loading...</span></p>
            <div class="journal-meta-row journal-meta-row-filters" aria-label="Journal display filters">
                <p class="journal-filter-heading"><strong class="journal-label">Journals:</strong></p>
                <div id="journal-filter-buttons" class="journal-filter-options">
                    <button type="button" class="journal-filter-button journal-tag-one-earth is-active" data-filter-kind="journal" data-journal-id="one-earth" aria-pressed="true">One Earth</button>
                    <button type="button" class="journal-filter-button journal-tag-nature-sustainability is-active" data-filter-kind="journal" data-journal-id="nature-sustainability" aria-pressed="true">Nature Sustainability</button>
                    <button type="button" class="journal-filter-button journal-tag-nature-geoscience is-active" data-filter-kind="journal" data-journal-id="nature-geoscience" aria-pressed="true">Nature Geoscience</button>
                    <button type="button" class="journal-filter-button journal-tag-nature-climate-change is-active" data-filter-kind="journal" data-journal-id="nature-climate-change" aria-pressed="true">Nature Climate Change</button>
                </div>
            </div>
        </section>

        <section class="journal-list-section">
            <div id="earthfront-updates-status" class="journal-status">Loading journal updates...</div>
            <div id="earthfront-updates-list" class="journal-list" aria-live="polite"></div>
        </section>
    </main>

    <script src="../js/script.js"></script>
    <script src="../js/journal-feed.js"></script>
    <script src="../js/earthfront-updates.js"></script>
</body>
</html>
