name: Update Journal Updates

on:
  schedule:
    - cron: "15 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-journal-updates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh journal metadata cache
        run: python scripts/update_journal_updates.py

      - name: Commit updated journal data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/journal_updates.json
          git diff --cached --quiet && exit 0
          git commit -m "Update journal feed"
          git push
