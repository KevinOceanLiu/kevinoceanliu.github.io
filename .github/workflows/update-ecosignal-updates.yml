name: Update EcoSignal Updates

on:
  schedule:
    - cron: "45 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-ecosignal-updates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh EcoSignal metadata cache
        run: python scripts/update_ecosignal_updates.py

      - name: Commit updated EcoSignal data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ecosignal_updates.json
          git diff --cached --quiet && exit 0
          git commit -m "Update EcoSignal feed"
          git push
