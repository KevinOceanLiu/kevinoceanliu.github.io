name: Update Google Scholar Citations

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-citations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update cached citation count
        env:
          SCHOLAR_USER_ID: Pup0q0gAAAAJ
        run: python scripts/update_citations.py

      - name: Commit updated citation data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/citations.json
          git diff --cached --quiet && exit 0
          git commit -m "Update Google Scholar citations"
          git push
